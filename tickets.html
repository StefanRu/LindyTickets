<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tickets</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5}
.bar{background:#2c3e50;color:#fff;padding:14px 20px;text-align:center;position:sticky;top:0;z-index:10}
.bar h1{font-size:1rem;margin-bottom:6px}
.bar button{background:#3498db;color:#fff;border:none;border-radius:6px;padding:7px 18px;font-size:.88rem;cursor:pointer;margin:3px}
.bar a{color:#fff;opacity:.7;font-size:.82rem;text-decoration:none;display:block;margin-top:6px}
#info{font-size:.82rem;margin-top:4px;opacity:.8}
.wrap{padding:16px;display:flex;flex-wrap:wrap;justify-content:center;gap:16px}
.tk{width:420px;height:190px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1);overflow:hidden;position:relative;page-break-inside:avoid}
.tk-band{background:linear-gradient(135deg,#2c3e50,#34495e);padding:14px;text-align:center;color:#fff}
.tk-band .en{font-size:15px;font-weight:700}.tk-band .es{font-size:10px;opacity:.7;margin-top:2px}
.tk-acc{height:3px;background:linear-gradient(90deg,#3498db,#2ecc71,#e67e22)}
.tk-body{display:flex;padding:14px 16px;align-items:center;gap:16px;height:calc(190px - 50px)}
.tk-info{flex:1}.tk-name{font-size:16px;font-weight:700;color:#2c3e50}
.tk-sub{font-size:11px;color:#888;margin-top:3px}
.tk-qr{text-align:center;flex-shrink:0}
.tk-qr canvas{display:block;margin:0 auto}
.tk-code{font-family:monospace;font-size:8px;color:#bbb;margin-top:3px;text-align:center}
.tk-foot{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:7px;color:#ccc}
@media print{.bar{display:none!important}body{background:#fff}.wrap{padding:0;gap:8px}.tk{box-shadow:none;border:1px solid #ddd;break-inside:avoid}}
</style>
</head>
<body>
<div class="bar">
  <h1>Tous les Tickets</h1>
  <button onclick="window.print()">Imprimer / PDF</button>
  <button onclick="load()">Recharger</button>
  <div id="info">Chargement...</div>
  <a href="admin.html">Admin</a>
</div>
<div class="wrap" id="wrap"><div style="padding:40px;color:#888">Chargement...</div></div>
<script>
var A='api.php',eid=new URLSearchParams(location.search).get('event_id')||1;
function load(){
  Promise.all([
    fetch(A+'?action=event&event_id='+eid).then(function(r){return r.json();}),
    fetch(A+'?action=guests&event_id='+eid).then(function(r){return r.json();})
  ]).then(function(res){
    var ev=res[0],gs=res[1],w=document.getElementById('wrap');
    w.innerHTML='';
    if(!gs.length){w.innerHTML='<div style="padding:40px;color:#888">Aucun ticket.</div>';document.getElementById('info').textContent='0';return;}
    document.getElementById('info').textContent=gs.length+' tickets — '+esc(ev.name||'');
    var name=ev.name||'Evenement',sub=[ev.event_date,ev.location].filter(Boolean).join('  —  ');
    gs.forEach(function(g){
      var d=document.createElement('div');d.className='tk';
      d.innerHTML='<div class="tk-band"><div class="en">'+esc(name)+'</div>'+(sub?'<div class="es">'+esc(sub)+'</div>':'')+'</div>'
        +'<div class="tk-acc"></div><div class="tk-body"><div class="tk-info"><div class="tk-name">'+esc(g.prenom)+' '+esc(g.nom)+'</div><div class="tk-sub">Ticket '+esc(g.ticket_label)+'</div></div>'
        +'<div class="tk-qr"><div id="q-'+g.ticket_code+'"></div><div class="tk-code">'+g.ticket_code+'</div></div></div>'
        +'<div class="tk-foot">1 ticket = 1 entree</div>';
      w.appendChild(d);
      new QRCode(document.getElementById('q-'+g.ticket_code),{text:g.ticket_code,width:85,height:85,colorDark:'#2c3e50',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
    });
  });
}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
load();
</script>
</body>
</html>
