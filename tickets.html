<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générer Tickets — Lindy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root { --primary: #1a1a2e; --accent: #e94560; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f0f2f5; }

  /* ── UI (hidden when printing) ── */
  .toolbar {
    background: var(--primary); color: #fff; padding: 16px 20px;
    text-align: center; position: sticky; top: 0; z-index: 10;
  }
  .toolbar h1 { font-size: 1.1rem; margin-bottom: 8px; }
  .toolbar button {
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 10px 24px; font-size: 0.95rem;
    cursor: pointer; margin: 4px;
  }
  .toolbar a { color: #fff; opacity: 0.7; font-size: 0.85rem; text-decoration: none; display: block; margin-top: 8px; }
  .toolbar select { padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; margin: 4px; }
  .loading { text-align: center; padding: 40px; color: #888; font-size: 1.1rem; }
  #status { font-size: 0.85rem; margin-top: 8px; opacity: 0.8; }

  /* ── Ticket cards ── */
  .tickets-container { padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }

  .ticket {
    width: 420px; height: 200px;
    background: #fff; border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    overflow: hidden; position: relative;
    page-break-inside: avoid;
  }
  .ticket-band {
    background: var(--primary); height: 56px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    color: #fff;
  }
  .ticket-band .ev-name { font-size: 15px; font-weight: 700; }
  .ticket-band .ev-sub { font-size: 10px; opacity: 0.8; margin-top: 2px; }
  .ticket-accent { height: 3px; background: var(--accent); }
  .ticket-body {
    display: flex; padding: 12px 16px; height: calc(200px - 59px);
    align-items: center;
  }
  .ticket-info { flex: 1; }
  .ticket-name { font-size: 16px; font-weight: 700; color: #333; }
  .ticket-sub { font-size: 12px; color: #888; margin-top: 4px; }
  .ticket-qr { width: 110px; text-align: center; }
  .ticket-qr canvas { display: block; margin: 0 auto; }
  .ticket-code { font-family: monospace; font-size: 9px; color: #aaa; margin-top: 4px; text-align: center; }
  .ticket-footer {
    position: absolute; bottom: 4px; left: 16px;
    font-size: 8px; color: #ccc;
  }

  /* ── Print styles ── */
  @media print {
    .toolbar { display: none !important; }
    body { background: #fff; }
    .tickets-container { padding: 0; gap: 10px; }
    .ticket {
      box-shadow: none;
      border: 1px solid #ddd;
      break-inside: avoid;
    }
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>🎟️ Génération des Tickets</h1>
  <div>
    <button onclick="window.print()">🖨️ Imprimer / Sauver en PDF</button>
    <button onclick="loadTickets()">🔄 Recharger</button>
  </div>
  <div id="status">Chargement...</div>
  <a href="admin.html">← Retour à l'admin</a>
</div>

<div class="tickets-container" id="tickets-container">
  <div class="loading">Chargement des tickets...</div>
</div>

<script>
const API = 'api.php';

async function loadTickets() {
  const [event, guests] = await Promise.all([
    fetch(API + '?action=event').then(r => r.json()),
    fetch(API + '?action=guests').then(r => r.json()),
  ]);

  const container = document.getElementById('tickets-container');
  container.innerHTML = '';

  if (!guests.length) {
    container.innerHTML = '<div class="loading">Aucun ticket. Importez une liste depuis l\'admin.</div>';
    document.getElementById('status').textContent = 'Aucun ticket';
    return;
  }

  document.getElementById('status').textContent = `${guests.length} tickets`;

  const evName = event.name || 'Événement';
  const evSub = [event.event_date, event.location].filter(Boolean).join('  •  ');

  for (const g of guests) {
    const ticket = document.createElement('div');
    ticket.className = 'ticket';
    ticket.innerHTML = `
      <div class="ticket-band">
        <div class="ev-name">${esc(evName)}</div>
        ${evSub ? `<div class="ev-sub">${esc(evSub)}</div>` : ''}
      </div>
      <div class="ticket-accent"></div>
      <div class="ticket-body">
        <div class="ticket-info">
          <div class="ticket-name">${esc(g.prenom)} ${esc(g.nom)}</div>
          <div class="ticket-sub">Ticket ${esc(g.ticket_label)}</div>
        </div>
        <div class="ticket-qr">
          <div id="qr-${g.ticket_code}"></div>
          <div class="ticket-code">${g.ticket_code}</div>
        </div>
      </div>
      <div class="ticket-footer">Présentez ce ticket à l'entrée • 1 ticket = 1 entrée</div>
    `;
    container.appendChild(ticket);

    // Generate QR code
    new QRCode(document.getElementById('qr-' + g.ticket_code), {
      text: g.ticket_code,
      width: 90,
      height: 90,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

loadTickets();
</script>
</body>
</html>
