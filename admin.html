<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Lindy Tickets</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root{--pri:#1a1a2e;--acc:#e94560;--ok:#27ae60;--warn:#f39c12;--err:#e74c3c;--bg:#f0f2f5;--card:#fff;--txt:#333;--mut:#888}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--txt)}
header{background:var(--pri);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:1.1rem}
header a{color:#fff;opacity:.7;font-size:.82rem;text-decoration:none}
.box{max-width:750px;margin:0 auto;padding:16px}
.card{background:var(--card);border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:1rem;margin-bottom:10px;color:var(--pri)}
label{display:block;font-size:.82rem;color:var(--mut);margin:8px 0 3px}
input[type=text],input[type=password],input[type=number],input[type=file],select,textarea{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:.9rem}
input:focus,select:focus,textarea:focus{border-color:var(--acc);outline:none}
textarea{height:130px;font-family:monospace;font-size:.82rem}
.btn{display:inline-block;padding:9px 18px;border:none;border-radius:8px;font-size:.88rem;cursor:pointer;color:#fff;margin-top:8px}
.bp{background:var(--acc)}.bs{background:var(--ok)}.bd{background:var(--err)}.bo{background:transparent;border:1.5px solid var(--pri);color:var(--pri)}
.btn-s{padding:5px 12px;font-size:.78rem;border-radius:6px;margin-top:0}
.msg{padding:8px 12px;border-radius:8px;margin-top:8px;font-size:.85rem;display:none}
.msg.ok{background:#d4edda;color:#155724;display:block}.msg.er{background:#f8d7da;color:#721c24;display:block}
.row{display:flex;gap:10px;align-items:flex-end}.row>*{flex:1}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sb{background:var(--bg);border-radius:10px;padding:14px;text-align:center}
.sb .n{font-size:1.6rem;font-weight:700;color:var(--pri)}.sb .l{font-size:.78rem;color:var(--mut)}
.gt{width:100%;border-collapse:collapse;margin-top:10px;font-size:.84rem}
.gt th{text-align:left;padding:7px 5px;border-bottom:2px solid #eee;color:var(--mut);font-weight:600;font-size:.76rem;text-transform:uppercase}
.gt td{padding:6px 5px;border-bottom:1px solid #f0f0f0}
.gt tr:hover{background:#fafafa}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.74rem;font-weight:600}
.badge-ok{background:#d4edda;color:#155724}.badge-w{background:#e2e3e5;color:#555}
.acts{display:flex;gap:3px;flex-wrap:wrap}
.hidden{display:none!important}
.help{font-size:.78rem;color:var(--mut);margin-top:3px}
</style>
</head>
<body>

<header>
  <h1>Admin — Lindy Tickets</h1>
  <a href="index.html">Scanner</a>
</header>

<!-- LOGIN -->
<div id="login" class="box">
  <div class="card">
    <h2>Connexion</h2>
    <label>Mot de passe admin</label>
    <input type="password" id="pw" placeholder="..." onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn bp" style="width:100%" onclick="doLogin()">Connexion</button>
    <div class="msg" id="login-msg"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="panel" class="box hidden">

  <!-- Event selector -->
  <div class="card">
    <h2>Evenement</h2>
    <div style="display:flex;gap:8px;align-items:center">
      <select id="ev-sel" onchange="onEvChange()" style="flex:1"></select>
      <button class="btn bp btn-s" onclick="showCreate()">+ Nouveau</button>
    </div>
    <!-- Create event form -->
    <div id="create-form" class="hidden" style="margin-top:12px;border-top:1px solid #eee;padding-top:12px">
      <div class="row">
        <div><label>Nom</label><input type="text" id="ce-name" placeholder="Soiree Rock"></div>
        <div><label>Date</label><input type="text" id="ce-date" placeholder="15/06/2026"></div>
      </div>
      <label>Lieu</label><input type="text" id="ce-loc" placeholder="Salle des Fetes">
      <label>Description</label><textarea id="ce-desc" style="height:60px" placeholder="Stage de Lindy Hop pour tous niveaux..."></textarea>
      <button class="btn bs btn-s" onclick="createEv()">Creer</button>
      <button class="btn bo btn-s" onclick="hideCreate()">Annuler</button>
    </div>
    <!-- Edit event -->
    <div id="edit-form" class="hidden" style="margin-top:12px;border-top:1px solid #eee;padding-top:12px">
      <div class="row">
        <div><label>Nom</label><input type="text" id="ee-name"></div>
        <div><label>Date</label><input type="text" id="ee-date"></div>
      </div>
      <label>Lieu</label><input type="text" id="ee-loc">
      <label>Description</label><textarea id="ee-desc" style="height:60px"></textarea>
      <label>Logo (URL de l'image)</label>
      <input type="text" id="ee-logo-url" placeholder="https://example.com/logo.png">
      <div style="display:flex;gap:8px;align-items:center;margin-top:6px">
        <span style="font-size:.78rem;color:var(--mut)">ou uploader :</span>
        <input type="file" id="ee-logo-file" accept="image/*" style="flex:1;font-size:.8rem">
        <button class="btn bp btn-s" onclick="uploadLogo()">Envoyer</button>
      </div>
      <div id="ee-logo-preview" style="margin-top:6px"></div>
      <div style="margin-top:8px">
        <button class="btn bp btn-s" onclick="saveEv()">Enregistrer</button>
        <button class="btn bd btn-s" onclick="delEv()">Supprimer</button>
      </div>
      <div class="msg" id="ee-msg"></div>
    </div>
    <div style="margin-top:6px"><a href="#" style="font-size:.8rem;color:var(--acc)" onclick="toggleEdit();return false">Modifier cet evenement</a></div>
  </div>

  <!-- Stats -->
  <div class="card">
    <h2>Statistiques</h2>
    <div class="sg">
      <div class="sb"><div class="n" id="st-t">-</div><div class="l">Total</div></div>
      <div class="sb"><div class="n" id="st-i" style="color:var(--ok)">-</div><div class="l">Entrees</div></div>
      <div class="sb"><div class="n" id="st-r">-</div><div class="l">Restants</div></div>
    </div>
    <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn bo btn-s" onclick="refresh()">Actualiser</button>
      <button class="btn bs btn-s" onclick="doExport()">Export CSV</button>
      <button class="btn bp btn-s" onclick="window.open('tickets.html?event_id='+evId)">Tous les tickets</button>
    </div>
  </div>

  <!-- Add guest -->
  <div class="card">
    <h2>Ajouter un invite</h2>
    <div class="row">
      <div><label>Nom</label><input type="text" id="ag-nom"></div>
      <div><label>Prenom</label><input type="text" id="ag-pre"></div>
      <div style="flex:0 0 80px"><label>Nb</label><input type="number" id="ag-nb" value="1" min="1" max="20"></div>
    </div>
    <button class="btn bp" onclick="addGuest()">Ajouter</button>
    <div class="msg" id="ag-msg"></div>
  </div>

  <!-- Import -->
  <div class="card">
    <h2>Importer une liste</h2>
    <label>Fichier Excel (.xlsx / .csv)</label>
    <p class="help">Colonnes: Nom, Prenom, Nb Tickets (en-tete ligne 1)</p>
    <input type="file" id="xl-file" accept=".xlsx,.xls,.csv">
    <button class="btn bp btn-s" onclick="importXl()">Importer</button>
    <div class="msg" id="xl-msg"></div>
    <div style="margin-top:12px;border-top:1px solid #eee;padding-top:10px">
      <label>Ou coller du JSON</label>
      <textarea id="json-data" placeholder='[{"nom":"Dupont","prenom":"Marie","nb_tickets":2}]'></textarea>
      <button class="btn bp btn-s" onclick="importJson()">Importer JSON</button>
      <div class="msg" id="json-msg"></div>
    </div>
  </div>

  <!-- Guest table -->
  <div class="card">
    <h2>Liste des invites</h2>
    <input type="text" id="filter" placeholder="Filtrer..." oninput="filterGuests()" style="margin-bottom:8px">
    <div style="overflow-x:auto">
      <table class="gt"><thead><tr><th>Nom</th><th>Ticket</th><th>Code</th><th>Statut</th><th>Actions</th></tr></thead>
      <tbody id="gtb"></tbody></table>
    </div>
  </div>

  <!-- Danger -->
  <div class="card" style="border:1px solid var(--err)">
    <h2 style="color:var(--err)">Zone Danger</h2>
    <button class="btn bd btn-s" onclick="resetAll()">Reinitialiser TOUS les check-ins</button>
    <div class="msg" id="rst-msg"></div>
  </div>

  <!-- Log -->
  <div class="card">
    <h2>Debug Log</h2>
    <button class="btn bo btn-s" onclick="openLog()">Ouvrir le log</button>
  </div>

</div>

<script>
const A = 'api.php';
let pw = '', evId = 0, guests = [];

// ── Auth ──
function doLogin() {
  pw = document.getElementById('pw').value;
  api('events').then(d => {
    if (d.error) throw d.error;
    document.getElementById('login').classList.add('hidden');
    document.getElementById('panel').classList.remove('hidden');
    fillEvents(d);
  }).catch(e => msg('login-msg','er',String(e)));
}

// ── API ──
function api(act, p) { return fetch(A+'?action='+act+(p||'')).then(r => r.json()); }
function post(act, body) {
  return fetch(A+'?action='+act, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(Object.assign({password:pw}, body))
  }).then(r => r.json());
}

// ── Events ──
function fillEvents(list) {
  const sel = document.getElementById('ev-sel');
  if (!list.length) { sel.innerHTML='<option value="">Aucun evenement</option>'; return; }
  sel.innerHTML = list.map(e => '<option value="'+e.id+'">'+esc(e.name)+' ('+e.total_tickets+' tickets)</option>').join('');
  const saved = parseInt(localStorage.getItem('lt_event_id')||'0',10);
  const found = list.find(e => parseInt(e.id,10) === saved);
  evId = found ? found.id : list[0].id;
  localStorage.setItem('lt_event_id', String(evId));
  sel.value = String(evId);
  refresh();
}
function onEvChange() {
  evId = parseInt(document.getElementById('ev-sel').value)||0;
  if (evId) localStorage.setItem('lt_event_id', String(evId));
  document.getElementById('edit-form').classList.add('hidden');
  if (evId) refresh();
}
function showCreate(){document.getElementById('create-form').classList.remove('hidden')}
function hideCreate(){document.getElementById('create-form').classList.add('hidden')}
function createEv() {
  post('create_event', {
    name: document.getElementById('ce-name').value,
    event_date: document.getElementById('ce-date').value,
    location: document.getElementById('ce-loc').value,
    description: document.getElementById('ce-desc').value,
  }).then(d => {
    if (d.error) return alert(d.error);
    evId = d.event_id; hideCreate(); reloadEvents();
  });
}
function toggleEdit() {
  const el = document.getElementById('edit-form');
  el.classList.toggle('hidden');
  if (!el.classList.contains('hidden')) {
    api('event','&event_id='+evId).then(e => {
      document.getElementById('ee-name').value = e.name||'';
      document.getElementById('ee-date').value = e.event_date||'';
      document.getElementById('ee-loc').value = e.location||'';
      document.getElementById('ee-desc').value = e.description||'';
      document.getElementById('ee-logo-url').value = e.logo_url||'';
      var pv = document.getElementById('ee-logo-preview');
      pv.innerHTML = e.logo_url ? '<img src="'+esc(e.logo_url)+'" style="max-height:60px;border-radius:6px">' : '<span style="color:var(--mut);font-size:.82rem">Aucun logo</span>';
    });
  }
}
function saveEv() {
  post('update_event', {
    event_id:evId,
    name:document.getElementById('ee-name').value,
    event_date:document.getElementById('ee-date').value,
    location:document.getElementById('ee-loc').value,
    description:document.getElementById('ee-desc').value,
    logo_url:document.getElementById('ee-logo-url').value,
  }).then(d => { msg('ee-msg',d.error?'er':'ok',d.error||'OK'); reloadEvents(); });
}
function uploadLogo() {
  var file = document.getElementById('ee-logo-file').files[0];
  if (!file) { msg('ee-msg','er','Selectionnez un fichier'); return; }
  var fd = new FormData();
  fd.append('logo', file);
  fd.append('event_id', evId);
  fd.append('password', pw);
  fetch(A+'?action=upload_logo', {method:'POST', body:fd}).then(function(r){return r.json();}).then(function(d){
    if (d.error) { msg('ee-msg','er',d.error); return; }
    msg('ee-msg','ok','Logo envoye — cliquez Enregistrer');
    document.getElementById('ee-logo-url').value = d.logo_url;
    document.getElementById('ee-logo-preview').innerHTML = '<img src="'+d.logo_url+'" style="max-height:60px;border-radius:6px">';
  });
}
function delEv() {
  if(!confirm('Supprimer cet evenement et tous ses tickets ?'))return;
  post('delete_event',{event_id:evId}).then(()=>{evId=0;reloadEvents();});
}
function reloadEvents() {
  api('events').then(d => {
    fillEvents(d);
    var preferred = parseInt(localStorage.getItem('lt_event_id') || String(evId), 10);
    var hasPreferred = d.some(function(e){ return parseInt(e.id,10)===preferred; });
    if (hasPreferred) {
      evId = preferred;
      document.getElementById('ev-sel').value = String(preferred);
      refresh();
    } else {
      document.getElementById('ev-sel').value=evId;
    }
  });
}

// ── Stats ──
function refresh() { refreshStats(); loadGuests(); }
function refreshStats() {
  if(!evId) return;
  api('stats','&event_id='+evId).then(d => {
    document.getElementById('st-t').textContent=d.total;
    document.getElementById('st-i').textContent=d.checked_in;
    document.getElementById('st-r').textContent=d.remaining;
  });
}

// ── Guest list ──
function loadGuests() {
  if(!evId) return;
  api('guests','&event_id='+evId).then(d => { guests=d; renderGuests(d); });
}
function renderGuests(list) {
  document.getElementById('gtb').innerHTML = list.map(g => {
    const ci = g.checked_in==1;
    const tm = g.checked_in_at ? new Date(g.checked_in_at).toLocaleTimeString('fr-FR') : '';
    const code = String(g.ticket_code||'');
    const codeJs = code.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const codeUrl = encodeURIComponent(code);
    return '<tr><td><b>'+esc(g.prenom)+' '+esc(g.nom)+'</b></td><td>'+esc(g.ticket_label)+'</td>'
      +'<td style="font-family:monospace;font-size:.78rem">'+esc(code)+'</td>'
      +'<td>'+(ci?'<span class="badge badge-ok">'+tm+'</span>':'<span class="badge badge-w">Attente</span>')+'</td>'
      +'<td class="acts">'
      +(ci?'<button class="btn btn-s" style="background:var(--warn)" onclick="resetOne(\''+codeJs+'\')">Reset</button>':'')
      +'<button class="btn btn-s bp" onclick="window.open(\'api.php?action=ticket_pdf&code='+codeUrl+'\',\'_blank\',\'noopener\')">Ticket</button>'
      +'<button class="btn btn-s bd" onclick="delTicket(\''+codeJs+'\')">X</button>'
      +'</td></tr>';
  }).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--mut);padding:20px">Aucun ticket</td></tr>';
}
function filterGuests() {
  const q = document.getElementById('filter').value.toLowerCase();
  renderGuests(q ? guests.filter(g=>(g.prenom+' '+g.nom+' '+g.ticket_code).toLowerCase().includes(q)) : guests);
}

// ── Actions ──
function resetOne(c){if(!confirm('Reset ce check-in ?'))return;post('reset_checkin',{event_id:evId,code:c}).then(()=>refresh());}
function delTicket(c){if(!confirm('Supprimer ce ticket ?'))return;post('delete_guest',{event_id:evId,code:c}).then(()=>refresh());}
function resetAll(){if(!confirm('TOUS les check-ins a zero ?'))return;post('reset_all',{event_id:evId}).then(d=>{msg('rst-msg',d.error?'er':'ok',d.error||d.reset+' reset');refresh();});}

function addGuest() {
  const nom=document.getElementById('ag-nom').value.trim();
  const pre=document.getElementById('ag-pre').value.trim();
  const nb=parseInt(document.getElementById('ag-nb').value)||1;
  if(!nom||!pre){msg('ag-msg','er','Nom et prenom requis');return;}
  post('add_guest',{event_id:evId,nom:nom,prenom:pre,nb_tickets:nb}).then(d => {
    if(d.error){msg('ag-msg','er',d.error);return;}
    const links=d.codes.map(c=>{
      const ec=esc(c), u=encodeURIComponent(c);
      return '<a href="api.php?action=ticket_pdf&code='+u+'" target="_blank" rel="noopener">'+ec+'</a>';
    }).join(' ');
    msg('ag-msg','ok',d.count+' ticket(s): '+links);
    document.getElementById('ag-nom').value='';document.getElementById('ag-pre').value='';document.getElementById('ag-nb').value='1';
    refresh();
  });
}

// ── Import ──
function importXl() {
  const file=document.getElementById('xl-file').files[0];
  if(!file){msg('xl-msg','er','Selectionnez un fichier');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    try {
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
      const g=[];
      for(let i=1;i<rows.length;i++){const r=rows[i];if(!r||!r[0]||!r[1])continue;g.push({nom:String(r[0]).trim(),prenom:String(r[1]).trim(),nb_tickets:parseInt(r[2])||1});}
      if(!g.length){msg('xl-msg','er','Aucun invite');return;}
      msg('xl-msg','ok',g.length+' noms, import...');
      post('import',{event_id:evId,guests:g}).then(d=>{msg('xl-msg',d.error?'er':'ok',d.error||d.imported+' tickets crees');refresh();});
    }catch(err){msg('xl-msg','er','Erreur: '+err.message);}
  };
  reader.readAsBinaryString(file);
}
function importJson() {
  let d;try{d=JSON.parse(document.getElementById('json-data').value);}catch(e){msg('json-msg','er','JSON invalide');return;}
  post('import',{event_id:evId,guests:d}).then(r=>{msg('json-msg',r.error?'er':'ok',r.error||r.imported+' tickets');refresh();});
}

function doExport(){window.open(A+'?action=export&event_id='+evId+'&password='+encodeURIComponent(pw));}
function openLog(){window.open(A+'?action=log&password='+encodeURIComponent(pw));}

function msg(id,t,txt){const el=document.getElementById(id);el.className='msg '+t;el.innerHTML=txt;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
</body>
</html>
