name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: 22
          local_path: './*'
          remote_path: '/www/lindy'
          sftp_only: true
          exclude: |
            config.php
            debug.log
            install.php
            upgrade.php
            uploads/**
            .git*
            .github/**
